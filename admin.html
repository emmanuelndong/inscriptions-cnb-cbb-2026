<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Inscriptions CNB / CBB 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--purple:#4A2370;--violet:#6B3FA0;--violet-soft:#efe9f6;--green:#1F7A44;--gold:#E0A52B;
    --paper:#FAF8F4;--card:#fff;--ink:#241F2E;--muted:#6A6478;--line:#e3dded;--danger:#B42318;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,-apple-system,sans-serif;font-size:14px}
  a{color:var(--violet)}
  header.brand{background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff}
  header.brand .band{max-width:1180px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:14px}
  header.brand h1{font-family:Marcellus,serif;font-weight:400;margin:0;font-size:22px}
  header.brand p{margin:2px 0 0;opacity:.85;font-size:13px}
  .crest{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff 0 46%,var(--gold) 47% 64%,var(--green) 65% 100%);display:grid;place-items:center}
  .crest span{font-size:20px}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 24px 70px}

  /* login */
  .login{max-width:380px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 8px 28px rgba(74,35,112,.08)}
  .login h2{font-family:Marcellus,serif;font-weight:400;color:var(--purple);margin:0 0 4px}
  .login p{color:var(--muted);font-size:13px;margin:0 0 18px}
  label{font-size:12.5px;font-weight:600;color:#433c52;display:block;margin-bottom:5px}
  input,select{font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 11px;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft)}
  .btn{border:0;border-radius:10px;padding:10px 18px;font:inherit;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:var(--purple);color:#fff}.btn.primary:hover{background:#3a1b59}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:#433c52}.btn.ghost:hover{border-color:var(--violet);color:var(--violet)}
  .err{color:var(--danger);font-size:12.5px;margin-top:10px;display:none}

  /* dashboard */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin-bottom:16px}
  .toolbar .f{flex:1;min-width:150px}
  .toolbar .actions{display:flex;gap:8px;flex-wrap:wrap}
  .stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:120px}
  .stat b{display:block;font-size:24px;color:var(--purple);font-family:Marcellus,serif}
  .stat span{font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  thead th{background:var(--violet-soft);text-align:left;padding:10px 12px;font-size:12px;color:var(--purple);text-transform:uppercase;letter-spacing:.3px}
  tbody td{padding:10px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:top}
  tbody tr:hover{background:#fbfafc}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px}
  .tbtn:hover{border-color:var(--violet);color:var(--violet)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .muted{color:var(--muted);font-size:12px}

  /* ================= PRINT / FICHE OFFICIELLE ================= */
  #print-root{display:none}
  @media print{
    body{background:#fff}
    .noprint{display:none !important}
    .wrap{display:none !important}
    #print-root{display:block}
    @page{size:A4;margin:10mm 14mm}
  }
  .fiche{font-family:Inter,sans-serif;color:#000;font-size:11px}
  .fiche .fbar{height:7px;background:linear-gradient(90deg,var(--purple),var(--violet));border-radius:3px;margin-bottom:8px}
  .fletterhead{display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--purple);padding-bottom:8px;margin-bottom:10px}
  .fletterhead .flogo{height:40px;width:auto;max-width:34%;object-fit:contain}
  .fletterhead .ft{flex:1;text-align:center}
  .fletterhead .org{font-size:9px;font-weight:700;letter-spacing:.3px;color:#333;text-transform:uppercase;margin-bottom:2px}
  .fletterhead h2{margin:0;font-family:Marcellus,serif;font-weight:400;font-size:15px;color:var(--purple)}
  .fletterhead .sub{font-size:9.5px;color:#444;letter-spacing:.3px;margin-top:1px}
  .fiche .blocktitle{background:var(--purple);color:#fff;font-weight:600;font-size:10.5px;letter-spacing:.4px;
    padding:4px 8px;margin:12px 0 0;text-transform:uppercase}
  .ftable{width:100%;border-collapse:collapse;margin-top:0}
  .ftable td{border:1px solid #999;padding:4px 6px;vertical-align:top}
  .ftable td.k{background:#f3eff8;font-weight:600;width:22%;white-space:nowrap}
  .ftable td.v{width:28%}
  .ftable.stages{margin-top:12px;table-layout:fixed}
  .ftable.stages td{width:33.33%}
  .ftable.stages td.sh{background:#f3eff8;font-weight:600;font-style:italic;color:#333;white-space:normal}
  .fiche .engageF{margin-top:12px;font-size:10.5px}
  .fiche .engageF b{display:block;margin-bottom:3px}
  .fiche .engageF li{margin:2px 0}
  .signrow{display:flex;justify-content:space-between;gap:18px;margin-top:64px;font-size:10px;text-align:center}
  .signrow .s{flex:1;border-top:1px solid #000;padding-top:4px;font-weight:600}
  .signrow-2{margin-top:54px;justify-content:flex-end}
  .signrow-2 .s{flex:0 0 34%}
  .fiche .engageF{margin-bottom:8px}
  .fiche .foot{margin-top:26px;border-top:1px solid #ccc;padding-top:6px;font-size:8.5px;color:#666;text-align:center;line-height:1.5}
</style>
</head>
<body>

<header class="brand">
  <div class="band">
    <div class="crest"><span>⚜️</span></div>
    <div><h1>Registre des inscriptions — CNB / CBB 2026</h1>
      <p>Scouts du Sénégal · Espace de gestion</p></div>
  </div>
</header>

<!-- LOGIN -->
<div id="loginView" class="wrap">
  <div class="login">
    <h2>Accès réservé</h2>
    <p>Entrez le mot de passe d'administration.</p>
    <label>Mot de passe</label>
    <input type="password" id="pwd" autocomplete="current-password">
    <p class="err" id="loginErr">Mot de passe incorrect.</p>
    <div style="margin-top:16px"><button class="btn primary" id="loginBtn" style="width:100%;justify-content:center">Accéder</button></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView" class="wrap" style="display:none">
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="f"><label>Camp</label><select id="fCamp"><option value="">Tous</option></select></div>
    <div class="f"><label>Région</label><select id="fRegion"><option value="">Toutes</option></select></div>
    <div class="f"><label>District</label><select id="fDistrict"><option value="">Tous</option></select></div>
    <div class="f"><label>Recherche</label><input id="fSearch" placeholder="Nom, prénom, groupe…"></div>
    <div class="actions">
      <button class="btn ghost" id="refreshBtn">↻ Actualiser</button>
      <button class="btn ghost" id="csvBtn">⬇️ CSV</button>
      <button class="btn ghost" id="printAllBtn">🖨️ Imprimer (filtré)</button>
      <button class="btn ghost" id="logoutBtn">Déconnexion</button>
    </div>
  </div>
  <div id="tableWrap"></div>
</div>

<div id="print-root"></div>

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function row(k,v){return `<tr><td class="k">${k}</td><td class="v">${esc(v)||'&nbsp;'}</td>`;}
function ficheHTML(r){
  const structRows=r.struct.map(s=>
    `<tr><td>${esc(s.intitule)}</td><td>${esc(s.date)||'&nbsp;'}</td><td>${esc(s.org)||'&nbsp;'}</td></tr>`).join('');
  const autreRows=(r.autre.length?r.autre:[{date:'',org:''}]).map(s=>
    `<tr><td>&nbsp;</td><td>${esc(s.date)||'&nbsp;'}</td><td>${esc(s.org)||'&nbsp;'}</td></tr>`).join('');
  return `<div class="fiche" style="page-break-after:always">
    <div class="fbar"></div>
    <div class="fletterhead">
      <img class="flogo" src="${LOGO_L}" alt="Scouts du Sénégal">
      <div class="ft">
        <div class="org">Scouts du Sénégal · Commissariat National Chargé des Adultes</div>
        <h2>Fiche d'inscription — ${esc(r.camp)||'Camp CNB / CBB 2026'}</h2>
        <div class="sub">Sébikotane · 4 – 11 septembre 2026</div>
      </div>
      <img class="flogo" src="${LOGO_R}" alt="Scoutisme Mondial">
    </div>
    <div class="blocktitle">Informations personnelles</div>
    <table class="ftable">
      ${row('Nom',r.nom)}${row('Prénoms',r.prenoms)}</tr>
      ${row('Date de naissance',r.naissance)}${row('Lieu de naissance',r.lieuNaissance)}</tr>
      ${row("Niveau d'étude",r.niveau)}${row('Religion',r.religion)}</tr>
      ${row('Adresse',r.adresse)}${row('E-mail',r.email)}</tr>
      ${row('Téléphone fixe',r.fixe)}${row('Mobile',r.mobile)}</tr>
      ${row('Profession',r.profession)}${row('Société / École',r.societe)}</tr>
      ${row('N° CNI / Passeport',r.cni)}${row("Date d'établissement",r.cniDate)}</tr>
      <tr><td class="k">Problèmes médicaux</td><td colspan="3">${esc(r.medical)||'&nbsp;'}</td></tr>
      <tr><td class="k">Contact d'urgence</td><td colspan="3">${esc(r.urgence)||'&nbsp;'}</td></tr>
    </table>
    <div class="blocktitle">Informations scoutes</div>
    <table class="ftable">
      ${row('Région',r.region)}${row('District',r.district)}</tr>
      ${row('Groupe',r.groupe)}${row('Fonction actuelle',r.fonction)}</tr>
      ${row("Date d'entrée scoutisme",r.entree)}${row('Date & lieu de promesse',r.promesse)}</tr>
    </table>
    <table class="ftable stages">
      <tr><td class="sh">Stages de formation structurée</td><td class="sh">Date et lieu de stage</td><td class="sh">Structure organisatrice</td></tr>
      ${structRows}
    </table>
    <table class="ftable stages" style="margin-top:10px">
      <tr><td class="sh">Autres stages de formation non structurée</td><td class="sh">Date et lieu de stage</td><td class="sh">Structure organisatrice</td></tr>
      ${autreRows}
    </table>
    <div class="engageF">
      <b>Je m'engage à :</b>
      <ul style="margin:0;padding-left:16px">
        <li>Participer de manière dynamique à la vie du camp tout en respectant le règlement intérieur, les valeurs et principes du camp.</li>
        <li>Assumer les directives qui me seront données et les obligations liées aux charges de stagiaire.</li>
      </ul>
    </div>
    <div class="signrow">
      <div class="s">L'intéressé(e)</div>
      <div class="s">Le Chef de Groupe</div>
      <div class="s">Le Commissaire District</div>
    </div>
    <div class="signrow signrow-2">
      <div class="s">Le Commissaire Régional Chargé des Adultes</div>
    </div>
    <div class="foot">Lot 2, Cité Keur-Gorgui, Sicap Sacré Cœur III, Dakar | BP: 1354 - Dakar (Sénégal)<br>
      Récépissé n°022686/MISP/DGAT/DLPL/DAPA<br>
      Tél : (+221) 77 540 59 63 - (+221) 33 842 30 72<br>
      E-mail : contact@scoutsdusenegal.org | www.scoutsdusenegal.org</div>
  </div>`;
}
function printFiches(arr){
  document.getElementById('print-root').innerHTML=arr.map(ficheHTML).join('');
  window.print();
}

  camp:r.camp,nom:r.nom,prenoms:r.prenoms,naissance:r.naissance,lieuNaissance:r.lieu_naissance,
  niveau:r.niveau,religion:r.religion,adresse:r.adresse,email:r.email,mobile:r.mobile,fixe:r.fixe,
  profession:r.profession,societe:r.societe,cni:r.cni,cniDate:r.cni_date,medical:r.medical,urgence:r.urgence,
  region:r.region,district:r.district,groupe:r.groupe,fonction:r.fonction,entree:r.entree,promesse:r.promesse,
  struct:Array.isArray(r.struct)?r.struct:(r.struct?JSON.parse(r.struct):[]),
  autre:Array.isArray(r.autre)?r.autre:(r.autre?JSON.parse(r.autre):[])
});
const campColor=c=>({'CNB Jaune':'#E0A52B','CNB Vert':'#1F7A44','CNB Rouge':'#B42318','CBB':'#4A2370'}[c]||'#b3adbf');

async function load(){
  try{
    const res=await fetch('/api/list',{headers:{'x-admin-key':KEY}});
    if(res.status===401){ logout(); document.getElementById('loginErr').style.display='block'; return; }
    const data=await res.json();
    ALL=data.rows||[];
    document.getElementById('loginView').style.display='none';
    document.getElementById('dashView').style.display='block';
    buildFilters(); render();
  }catch(err){ alert('Erreur de chargement : '+err); }
}

function uniq(arr){return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr'));}
function buildFilters(){
  const fill=(id,vals,label)=>{const s=document.getElementById(id);const cur=s.value;
    s.innerHTML=`<option value="">${label}</option>`+vals.map(v=>`<option>${esc(v)}</option>`).join('');s.value=cur;};
  fill('fCamp',uniq(ALL.map(r=>r.camp)),'Tous');
  fill('fRegion',uniq(ALL.map(r=>r.region)),'Toutes');
  fill('fDistrict',uniq(ALL.map(r=>r.district)),'Tous');
}
function filtered(){
  const c=document.getElementById('fCamp').value, rg=document.getElementById('fRegion').value,
        d=document.getElementById('fDistrict').value, q=document.getElementById('fSearch').value.toLowerCase().trim();
  return ALL.filter(r=>(!c||r.camp===c)&&(!rg||r.region===rg)&&(!d||r.district===d)&&
    (!q||[r.nom,r.prenoms,r.groupe,r.mobile,r.email].some(v=>(v||'').toLowerCase().includes(q))));
}
function render(){
  const rows=filtered();
  const byCamp=c=>ALL.filter(r=>r.camp===c).length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><b>${ALL.length}</b><span>inscriptions au total</span></div>`+
    `<div class="stat"><b>${rows.length}</b><span>affichées (filtre)</span></div>`+
    ['CNB Jaune','CNB Vert','CNB Rouge','CBB'].map(c=>`<div class="stat"><b>${byCamp(c)}</b><span>${c}</span></div>`).join('');
  if(!rows.length){document.getElementById('tableWrap').innerHTML='<div class="empty">Aucune inscription.</div>';return;}
  document.getElementById('tableWrap').innerHTML=`<table><thead><tr>
    <th>Date</th><th>Camp</th><th>Nom & prénoms</th><th>Région</th><th>District</th><th>Groupe</th><th>Mobile</th><th></th>
    </tr></thead><tbody>${rows.map((r,i)=>`<tr>
      <td class="muted">${fmtDate(r.created_at)}</td>
      <td><span class="dot" style="background:${campColor(r.camp)}"></span>${esc(r.camp)}</td>
      <td><b>${esc(r.prenoms)} ${esc(r.nom)}</b></td>
      <td>${esc(r.region)}</td><td>${esc(r.district)}</td><td>${esc(r.groupe)}</td>
      <td class="muted">${esc(r.mobile)}</td>
      <td><button class="tbtn" data-i="${ALL.indexOf(r)}">🖨️ Fiche</button></td>
    </tr>`).join('')}</tbody></table>`;
  document.querySelectorAll('.tbtn[data-i]').forEach(b=>b.onclick=()=>printFiches([rowToReg(ALL[+b.dataset.i])]));
}
function exportCsv(){
  const rows=filtered();
  if(!rows.length){alert('Aucune inscription à exporter');return;}
  const cols=[['created_at','Horodatage'],['camp','Camp'],['nom','Nom'],['prenoms','Prénoms'],
    ['naissance','Date naissance'],['lieu_naissance','Lieu naissance'],['niveau','Niveau'],['religion','Religion'],
    ['adresse','Adresse'],['email','E-mail'],['mobile','Mobile'],['fixe','Tél fixe'],['profession','Profession'],
    ['societe','Société/École'],['cni','CNI/Passeport'],['cni_date','Date établissement'],['medical','Médical'],
    ['urgence','Contact urgence'],['region','Région'],['district','District'],['groupe','Groupe'],
    ['fonction','Fonction'],['entree','Entrée scoutisme'],['promesse','Promesse']];
  const q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const head=cols.map(c=>q(c[1])).concat([q('Stages structurés'),q('Stages libres')]).join(';');
  const body=rows.map(r=>{
    const base=cols.map(c=>q(c[0]==='created_at'?fmtDate(r.created_at):r[c[0]]));
    const st=(r.struct||[]).filter(s=>s.date||s.org).map(s=>`${s.intitule}: ${s.date} / ${s.org}`).join(' | ');
    const au=(r.autre||[]).map(s=>`${s.date} / ${s.org}`).join(' | ');
    return base.concat([q(st),q(au)]).join(';');
  });
  const csv='\uFEFF'+[head,...body].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`inscriptions-cnb-cbb-2026-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function logout(){sessionStorage.removeItem('admin_key');KEY='';
  document.getElementById('dashView').style.display='none';
  document.getElementById('loginView').style.display='block';}

document.getElementById('loginBtn').onclick=()=>{
  KEY=document.getElementById('pwd').value;sessionStorage.setItem('admin_key',KEY);
  document.getElementById('loginErr').style.display='none';load();
};
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});
['fCamp','fRegion','fDistrict'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('fSearch').addEventListener('input',render);
document.getElementById('refreshBtn').onclick=load;
document.getElementById('csvBtn').onclick=exportCsv;
document.getElementById('printAllBtn').onclick=()=>{const rows=filtered();if(!rows.length){alert('Rien à imprimer');return;}printFiches(rows.map(rowToReg));};
document.getElementById('logoutBtn').onclick=logout;

if(KEY) load();
</script>
</body>
</html>
