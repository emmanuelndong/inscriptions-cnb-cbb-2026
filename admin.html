<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Inscriptions CNB / CBB 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--purple:#4A2370;--violet:#6B3FA0;--violet-soft:#efe9f6;--green:#1F7A44;--gold:#E0A52B;
    --paper:#FAF8F4;--card:#fff;--ink:#241F2E;--muted:#6A6478;--line:#e3dded;--danger:#B42318;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,-apple-system,sans-serif;font-size:14px}
  a{color:var(--violet)}
  header.brand{background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff}
  header.brand .band{max-width:1180px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:14px}
  header.brand h1{font-family:Marcellus,serif;font-weight:400;margin:0;font-size:22px}
  .btn-logout{margin-left:auto;flex:0 0 auto;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:9px;padding:8px 14px;font:inherit;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-logout:hover{background:rgba(255,255,255,.24)}
  header.brand p{margin:2px 0 0;opacity:.85;font-size:13px}
  .crest{width:44px;height:44px;flex:0 0 auto;display:grid;place-items:center}
  .crest img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 24px 70px}

  /* login */
  .login{max-width:380px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 8px 28px rgba(74,35,112,.08)}
  .login h2{font-family:Marcellus,serif;font-weight:400;color:var(--purple);margin:0 0 4px}
  .login p{color:var(--muted);font-size:13px;margin:0 0 18px}
  label{font-size:12.5px;font-weight:600;color:#433c52;display:block;margin-bottom:5px}
  input,select{font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 11px;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft)}
  .btn{border:0;border-radius:10px;padding:10px 18px;font:inherit;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:var(--purple);color:#fff}.btn.primary:hover{background:#3a1b59}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:#433c52}.btn.ghost:hover{border-color:var(--violet);color:var(--violet)}
  .btn.danger{background:#fff;border:1px solid #e7b7b1;color:var(--danger)}.btn.danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
  .btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
  .err{color:var(--danger);font-size:12.5px;margin-top:10px;display:none}

  /* dashboard */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin-bottom:16px}
  .toolbar .f{flex:1;min-width:150px}
  .toolbar .actions{display:flex;gap:8px;flex-wrap:wrap}
  .stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:120px}
  .stat b{display:block;font-size:24px;color:var(--purple);font-family:Marcellus,serif}
  .stat span{font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  thead th{background:var(--violet-soft);text-align:left;padding:10px 12px;font-size:12px;color:var(--purple);text-transform:uppercase;letter-spacing:.3px}
  tbody td{padding:10px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:top}
  tbody tr:hover{background:#fbfafc}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12px}
  .tbtn:hover{border-color:var(--violet);color:var(--violet)}
  .stbadge{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;white-space:nowrap}
  .stbadge.done{background:#e9f5ee;color:var(--green)}
  .stbadge.wait{background:#f0ecf6;color:#6a6478}
  .stbadge.todo{background:#eaf1fd;color:#1f4fb4}
  .stbadge.rej{background:#fdeceb;color:var(--danger);cursor:help}
  .stbadge.crca{background:#eaf1fd;color:#1f4fb4}
  .acctctx{display:inline-block;margin-right:10px;padding:2px 9px;border-radius:20px;background:rgba(255,255,255,.18);font-size:11.5px;font-weight:700;vertical-align:middle}
  .dupbadge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--danger);background:#fdeceb;border:1px solid #f0c8c3;border-radius:20px;padding:1px 8px;margin-left:4px;white-space:nowrap;cursor:help;vertical-align:middle}
  .duprow{background:#fff8f7}
  .duprow:hover{background:#fdeceb}
  .dupchk{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--danger);white-space:nowrap;cursor:pointer;padding-top:2px}
  .dupchk input{width:auto}
  .stat.dupstat b{color:var(--danger)}
  td.assur{font-variant-numeric:tabular-nums;white-space:nowrap;color:#433c52}
  .namelink{cursor:pointer;color:inherit;text-decoration:none;border-bottom:1px dashed transparent}
  .namelink:hover{color:var(--violet);border-bottom-color:var(--violet)}
  .pvbg{position:fixed;inset:0;background:rgba(36,31,46,.55);display:none;z-index:60;align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
  .pvbg.show{display:flex}
  .pvmodal{background:#fff;border-radius:14px;max-width:900px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);overflow:hidden;margin:auto}
  .pvhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);background:#fbfafc;flex-wrap:wrap}
  .pvhead h3{margin:0;font-family:Marcellus,serif;font-weight:400;color:var(--purple);font-size:18px}
  .pvsub{color:var(--muted);font-size:12.5px;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pvactions{display:flex;gap:8px}
  .pvbody{background:#f0ecf6;padding:16px;max-height:74vh;overflow:auto}
  .pvbody .fiche{margin:0 auto;box-shadow:0 6px 24px rgba(0,0,0,.12);background:#fff}
  .sfile{margin-left:2px;text-decoration:none;font-size:13px}
  .stwrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .mini{border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 9px;font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .mini.ok{border-color:#bfe3cd;color:var(--green)}.mini.ok:hover{background:var(--green);color:#fff;border-color:var(--green)}
  .mini.no{border-color:#e7b7b1;color:var(--danger)}.mini.no:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .muted{color:var(--muted);font-size:12px}

  /* dashboard charts */
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:18px}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .chart-card h3{margin:0 0 14px;font-size:12px;color:var(--purple);font-family:Marcellus,serif;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
  .donutwrap{display:flex;align-items:center;gap:16px}
  .legend{display:flex;flex-direction:column;gap:7px;font-size:12.5px;flex:1}
  .legend .li{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .legend .li .lab{display:flex;align-items:center;gap:8px}
  .legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block;flex:0 0 auto}
  .legend .num{font-weight:600;color:#433c52;font-variant-numeric:tabular-nums}
  .barrow{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:12.5px}
  .blabel{width:96px;flex:0 0 auto;color:#433c52;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btrack{flex:1;background:#f0ecf6;border-radius:6px;height:15px;overflow:hidden}
  .bfill{display:block;height:100%;border-radius:6px;min-width:2px;transition:width .4s}
  .bval{width:34px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}

  /* ================= PRINT / FICHE OFFICIELLE ================= */
  #print-root{display:none}
  @media print{
    body{background:#fff}
    .noprint{display:none !important}
    .wrap{display:none !important}
    #print-root{display:block}
    @page{size:A4;margin:10mm 14mm}
  }
  .fiche{font-family:Inter,sans-serif;color:#000;font-size:11px;display:flex;flex-direction:column;min-height:277mm}
  .fbottom{margin-top:auto}
  .fiche .fbar{height:7px;background:linear-gradient(90deg,var(--purple),var(--violet));border-radius:3px;margin-bottom:8px}
  .fletterhead{display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--purple);padding-bottom:8px;margin-bottom:10px}
  .fletterhead .flogo{height:40px;width:auto;max-width:34%;object-fit:contain}
  .fletterhead .ft{flex:1;text-align:center}
  .fletterhead .org{font-size:9px;font-weight:700;letter-spacing:.3px;color:#333;text-transform:uppercase;margin-bottom:2px}
  .fletterhead h2{margin:0;font-family:Marcellus,serif;font-weight:400;font-size:15px;color:var(--purple)}
  .fletterhead .sub{font-size:9.5px;color:#444;letter-spacing:.3px;margin-top:1px}
  .fiche .blocktitle{background:var(--purple);color:#fff;font-weight:600;font-size:10.5px;letter-spacing:.4px;
    padding:4px 8px;margin:12px 0 0;text-transform:uppercase}
  .ftable{width:100%;border-collapse:collapse;margin-top:0}
  .ftable td{border:1px solid #999;padding:4px 6px;vertical-align:top}
  .ftable td.k{background:#f3eff8;font-weight:600;width:22%;white-space:nowrap}
  .ftable td.v{width:28%}
  .ftable.stages{margin-top:12px;table-layout:fixed}
  .ftable.stages td{width:33.33%}
  .ftable.stages td.sh{background:#f3eff8;font-weight:600;font-style:italic;color:#333;white-space:normal}
  .fiche .engageF{margin-top:12px;font-size:10.5px}
  .fiche .engageF b{display:block;margin-bottom:3px}
  .fiche .engageF li{margin:2px 0}
  .signrow{display:flex;justify-content:space-between;gap:18px;margin-top:64px;font-size:10px;text-align:center}
  .signrow .s{flex:1;border-top:1px solid #000;padding-top:4px;font-weight:600}
  .signrow-2{margin-top:54px;justify-content:flex-end}
  .signrow-2 .s{flex:0 0 34%}
  .fiche .engageF{margin-bottom:8px}
  .fiche .foot{margin-top:26px;border-top:1px solid #ccc;padding-top:6px;font-size:8.5px;color:#666;text-align:center;line-height:1.5}
</style>
</head>

function row(k,v){return `<tr><td class="k">${k}</td><td class="v">${esc(v)||'&nbsp;'}</td>`;}
function ficheHTML(r){
  const structRows=r.struct.map(s=>
    `<tr><td>${esc(s.intitule)}</td><td>${esc(s.date)||'&nbsp;'}</td><td>${esc(s.org)||'&nbsp;'}</td></tr>`).join('');
  const autreRows=(r.autre.length?r.autre:[{date:'',org:''}]).map(s=>
    `<tr><td>&nbsp;</td><td>${esc(s.date)||'&nbsp;'}</td><td>${esc(s.org)||'&nbsp;'}</td></tr>`).join('');
  return `<div class="fiche" style="page-break-after:always">
    <div class="fbar"></div>
    <div class="fletterhead">
      <img class="flogo" src="${LOGO_L}" alt="Scouts du Sénégal">
      <div class="ft">
        <div class="org">Scouts du Sénégal · Commissariat National Chargé des Adultes</div>
        <h2>Fiche d'inscription — ${esc(r.camp)||'Camp CNB / CBB 2026'}</h2>
        <div class="sub">Sébikotane · 4 – 11 septembre 2026</div>
        ${r.ref?`<div class="sub" style="margin-top:2px;font-weight:700;color:var(--purple)">Référence : ${esc(r.ref)}</div>`:''}
      </div>
      <img class="flogo" src="${LOGO_R}" alt="Scoutisme Mondial">
    </div>
    <div class="blocktitle">Informations personnelles</div>
    <table class="ftable">
      ${row('Nom',r.nom)}${row('Prénoms',r.prenoms)}</tr>
      ${row('Date de naissance',r.naissance)}${row('Lieu de naissance',r.lieuNaissance)}</tr>
      ${row("Niveau d'étude",r.niveau)}${row('Religion',r.religion)}</tr>
      ${row('Adresse',r.adresse)}${row('E-mail',r.email)}</tr>
      ${row('Téléphone fixe',r.fixe)}${row('Mobile',r.mobile)}</tr>
      ${row('Profession',r.profession)}${row('Société / École',r.societe)}</tr>
      ${row('N° CNI / Passeport',r.cni)}${row("Date d'établissement",r.cniDate)}</tr>
      ${row('Taille (tenue de camp)',r.taille)}${row("N° d'assurance",r.assurance)}</tr>
      <tr><td class="k">Problèmes médicaux</td><td colspan="3">${esc(r.medical)||'&nbsp;'}</td></tr>
      <tr><td class="k">Contact d'urgence</td><td colspan="3">${esc(r.urgence)||'&nbsp;'}</td></tr>
    </table>
    <div class="blocktitle">Informations scoutes</div>
    <table class="ftable">
      ${row('Région',r.region)}${row('District',r.district)}</tr>
      ${row('Groupe',r.groupe)}${row('Fonction actuelle',r.fonction)}</tr>
      ${row("Année d'entrée",r.entree)}${row('Année de promesse',r.promesse)}</tr>
    </table>
    <table class="ftable stages">
      <tr><td class="sh">Stages de formation structurée</td><td class="sh">Date et lieu de stage</td><td class="sh">Structure organisatrice</td></tr>
      ${structRows}
    </table>
    <table class="ftable stages" style="margin-top:10px">
      <tr><td class="sh">Autres stages de formation non structurée</td><td class="sh">Date et lieu de stage</td><td class="sh">Structure organisatrice</td></tr>
      ${autreRows}
    </table>
    <div class="engageF">
      <b>Je m'engage à :</b>
      <ul style="margin:0;padding-left:16px">
        <li>Participer de manière dynamique à la vie du camp tout en respectant le règlement intérieur, les valeurs et principes du camp.</li>
        <li>Assumer les directives qui me seront données et les obligations liées aux charges de stagiaire.</li>
        <li>Respecter les mesures sanitaires.</li>
      </ul>
    </div>
    <div class="fbottom">
    <div class="signrow">
      <div class="s">L'intéressé(e)</div>
      <div class="s">Le Chef de Groupe</div>
      <div class="s">Le Commissaire District</div>
    </div>
    <div class="signrow signrow-2">
      <div class="s">Le Commissaire Régional Chargé des Adultes</div>
    </div>
    <div class="foot">Lot 2, Cité Keur-Gorgui, Sicap Sacré Cœur III, Dakar | BP: 1354 - Dakar (Sénégal)<br>
      Récépissé n°022686/MISP/DGAT/DLPL/DAPA<br>
      Tél : (+221) 77 540 59 63 - (+221) 33 842 30 72<br>
      E-mail : contact@scoutsdusenegal.org | www.scoutsdusenegal.org</div>
    </div>
  </div>`;
}
function printFiches(arr){
  document.getElementById('print-root').innerHTML=arr.map(ficheHTML).join('');
  window.print();
}

function _loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=()=>reject(new Error('load fail '+src));document.head.appendChild(s);});}
async function ensureHtml2pdf(){
  if(typeof html2pdf!=='undefined') return true;
  if(!_h2pPromise){
    _h2pPromise=(async()=>{
      const sources=['/html2pdf.bundle.min.js','https://cdn.jsdelivr.net/npm/html2pdf.js@0.14.0/dist/html2pdf.bundle.min.js'];
      for(const src of sources){ try{ await _loadScript(src); if(typeof html2pdf!=='undefined') return true; }catch(e){} }
      return typeof html2pdf!=='undefined';
    })();
  }
  return _h2pPromise;
}
function fileSafe(s){return (s||'').toString().replace(/[\\/:*?"<>|\n\r\t]+/g,' ').replace(/\s+/g,' ').trim();}
function pdfName(reg){
  let b=fileSafe(reg.nom)+' '+fileSafe(reg.prenoms);
  if(reg.camp) b+=' - '+fileSafe(reg.camp);
  return b.replace(/\s+/g,' ').trim()||'fiche';
}
async function downloadFichePDF(reg){
  const base=pdfName(reg), filename=base+'.pdf';
  const ready=await ensureHtml2pdf();
  if(!ready){ // repli : impression (titre = nom suggéré)
    const prev=document.title; document.title=base; printFiches([reg]);
    setTimeout(()=>{document.title=prev;},1500); return;
  }
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-10000px;top:0;width:182mm;background:#fff';
  holder.innerHTML=ficheHTML(reg);
  const el=holder.firstElementChild; el.style.minHeight='272mm';
  document.body.appendChild(holder);
  try{
    await html2pdf().set({
      filename, margin:[10,14,10,14],
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['avoid-all']}
    }).from(el).save();
  }catch(err){
    const prev=document.title; document.title=base; printFiches([reg]);
    setTimeout(()=>{document.title=prev;},1500);
  }finally{ holder.remove(); }
}

const fmtDate=s=>{if(!s)return '—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('fr-FR');};
let KEY=sessionStorage.getItem('admin_key')||'';
let USER=sessionStorage.getItem('admin_user')||'';
let ROLE=sessionStorage.getItem('admin_role')||'';
let REGION=sessionStorage.getItem('admin_region')||'';
let ALL=[];
const authHeaders=(extra)=>Object.assign({'x-user':USER,'x-key':KEY},extra||{});

const rowToReg=r=>({
  camp:r.camp,nom:r.nom,prenoms:r.prenoms,naissance:r.naissance,lieuNaissance:r.lieu_naissance,
  niveau:r.niveau,religion:r.religion,adresse:r.adresse,email:r.email,mobile:r.mobile,fixe:r.fixe,
  profession:r.profession,societe:r.societe,cni:r.cni,cniDate:r.cni_date,taille:r.taille,assurance:r.assurance,medical:r.medical,urgence:r.urgence,
  region:r.region,district:r.district,groupe:r.groupe,fonction:r.fonction,entree:r.entree,promesse:r.promesse,
  struct:Array.isArray(r.struct)?r.struct:(r.struct?JSON.parse(r.struct):[]),
  autre:Array.isArray(r.autre)?r.autre:(r.autre?JSON.parse(r.autre):[]),
  ref:r.ref
});
const campColor=c=>({'CNB Jaune':'#E0A52B','CNB Vert':'#1F7A44','CNB Rouge':'#B42318','CBB':'#4A2370'}[c]||'#b3adbf');

// --- détection des doublons ---
const normTxt=s=>(s==null?'':s.toString()).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/['’`´]/g,'').replace(/\s+/g,' ').trim();
const normNum2=s=>normTxt(s).replace(/\s/g,'');
function dupKey(r){ const a=normNum2(r.assurance); return a?('A:'+a):('N:'+normTxt(r.nom)+'|'+normTxt(r.prenoms)+'|'+normTxt(r.naissance)); }
let DUP=new Set(), DUPINFO={};
function computeDups(){
  const m={}; DUP=new Set(); DUPINFO={};
  ALL.forEach(r=>{ const k=dupKey(r); (m[k]=m[k]||[]).push(r); });
  Object.entries(m).forEach(([k,list])=>{ if(list.length>1){ DUP.add(k); DUPINFO[k]=list; } });
}
const stLabel=st=>({en_attente:'En attente',validee_crca:'Validée CRCA',validee:'Validée finale',rejetee:'Rejetée'}[st]||'En attente');function dupBadge(dk){
  const list=DUPINFO[dk]||[];
  const others=list.map(x=>`• ${x.prenoms} ${x.nom} [${x.ref||'—'}] — ${stLabel(x.statut)}`).join('\n');
  const by = (dk[0]==='A') ? 'même n° d\u2019assurance' : 'mêmes nom, prénoms et date de naissance';
  return `<span class="dupbadge" title="${esc(list.length+' inscriptions avec '+by+' :\n'+others)}">⚠ ${list.length} doublons</span>`;
}

let currentPreview=null;
function openPreview(row){
  try{
    if(!row){return;}
    const modal=document.getElementById('previewModal');
    if(!modal){alert('Aperçu indisponible (rechargez la page).');return;}
    const reg=rowToReg(row); currentPreview=reg;
    const st=row.statut||'en_attente';
    const cls=st==='validee'?'done':st==='validee_crca'?'crca':st==='rejetee'?'rej':'wait';
    document.getElementById('pvTitle').textContent=`${reg.prenoms||''} ${reg.nom||''}`.trim()||'Fiche';
    document.getElementById('pvSub').innerHTML=`${esc(reg.camp||'')} · ${esc(reg.region||'')} `+
      `<span class="stbadge ${cls}">${stLabel(st)}</span>`+
      (row.ref?` · Réf. ${esc(row.ref)}`:'')+
      (row.motif?` · <span style="color:var(--danger)">Motif : ${esc(row.motif)}</span>`:'');
    let body;
    try{ body=ficheHTML(reg); }
    catch(e){ body='<div style="background:#fff;padding:20px;border-radius:10px">Aperçu de la fiche indisponible pour cette inscription.<br><small>'+esc(String(e))+'</small></div>'; }
    document.getElementById('previewBody').innerHTML=body;
    document.getElementById('previewBody').scrollTop=0;
    modal.classList.add('show');
  }catch(err){ alert('Erreur d\u2019aperçu : '+err); }
}
function closePreview(){ const m=document.getElementById('previewModal'); if(m) m.classList.remove('show'); }

function statutCell(r){
  const st=r.statut||'en_attente';
  let badge;
  if(st==='validee') badge='<span class="stbadge done">✓✓ Validée finale</span>';
  else if(st==='validee_crca') badge='<span class="stbadge crca">✓ Validée CRCA</span>';
  else if(st==='rejetee') badge=`<span class="stbadge rej" title="${esc(r.motif)||''}">✗ Rejetée</span>`;
  else badge='<span class="stbadge wait">En attente</span>';
  const vc=`<button class="mini ok vcBtn" data-ref="${esc(r.ref)}">Valider</button>`;
  const vf=`<button class="mini ok vfBtn" data-ref="${esc(r.ref)}">Valider (finale)</button>`;
  const rj=`<button class="mini no rBtn" data-ref="${esc(r.ref)}">Rejeter</button>`;
  let actions='';
  if(ROLE==='crca'){
    if(st==='en_attente'||st==='rejetee') actions=vc+' '+rj;
    else if(st==='validee_crca') actions=rj;           // peut revenir en arrière ; en attente du national
    // st==='validee' -> verrouillé (le national a tranché)
  }else{ // national
    if(st==='en_attente'||st==='rejetee') actions=vc+' '+rj;      // pousser la 1re validation si besoin
    else if(st==='validee_crca') actions=vf+' '+rj;
    else if(st==='validee') actions=rj;                            // annuler la validation finale
  }
  return `<div class="stwrap">${badge}${actions?' '+actions:''}</div>`;
}

async function validate(ref, action, motif){
  if(!ref){alert('Référence manquante');return;}
  try{
    const res=await fetch('/api/validate',{method:'POST',
      headers:authHeaders({'Content-Type':'application/json'}),
      body:JSON.stringify({ref,action,motif:motif||''})});
    if(res.status===401){alert('Session expirée, reconnectez-vous.');logout();return;}
    const d=await res.json();
    if(!d.ok){alert(d.error||'Échec.');return;}
    load();
  }catch(e){alert('Erreur : '+e);}
}

async function load(){
  try{
    const res=await fetch('/api/list',{headers:authHeaders()});
    if(res.status===401){ logout(); document.getElementById('loginErr').style.display='block'; return; }
    const data=await res.json();
    ALL=data.rows||[];
    computeDups();
    if(data.role) ROLE=data.role;
    if(data.region!==undefined && data.region!==null) REGION=data.region;
    document.getElementById('loginView').style.display='none';
    document.getElementById('dashView').style.display='block';
    document.getElementById('logoutTop').style.display='inline-flex';
    applyRole();
    buildFilters(); renderCharts(); render();
  }catch(err){ alert('Erreur de chargement : '+err); }
}

function applyRole(){
  const crca = ROLE==='crca';
  // le CRCA ne voit que sa région : on masque le filtre région et le bouton Vider
  const rf=document.getElementById('fRegion'); if(rf) rf.closest('.f').style.display=crca?'none':'';
  const cb=document.getElementById('clearBtn'); if(cb) cb.style.display=crca?'none':'';
  const ctx=document.getElementById('acctCtx');
  if(ctx) ctx.textContent = crca ? ('CRCA — '+(REGION||'')) : 'National';
}

function uniq(arr){return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr'));}
function buildFilters(){
  const fill=(id,vals,label)=>{const s=document.getElementById(id);const cur=s.value;
    s.innerHTML=`<option value="">${label}</option>`+vals.map(v=>`<option>${esc(v)}</option>`).join('');s.value=cur;};
  fill('fCamp',uniq(ALL.map(r=>r.camp)),'Tous');
  fill('fRegion',uniq(ALL.map(r=>r.region)),'Toutes');
  fill('fDistrict',uniq(ALL.map(r=>r.district)),'Tous');
}
function filtered(){
  const c=document.getElementById('fCamp').value, rg=document.getElementById('fRegion').value,
        d=document.getElementById('fDistrict').value, st=document.getElementById('fStatut').value,
        dup=document.getElementById('fDup').checked,
        q=document.getElementById('fSearch').value.toLowerCase().trim();
  const qd=q.replace(/\D/g,''); // recherche numérique (n° assurance, mobile) sans espaces
  return ALL.filter(r=>(!c||r.camp===c)&&(!rg||r.region===rg)&&(!d||r.district===d)&&
    (!st||(r.statut||'en_attente')===st)&&
    (!dup||DUP.has(dupKey(r)))&&
    (!q||[r.nom,r.prenoms,r.groupe,r.mobile,r.email,r.ref,r.assurance].some(v=>(v||'').toLowerCase().includes(q))
       ||(qd.length>=2&&[r.assurance,r.mobile,r.cni].some(v=>((v||'').replace(/\D/g,'')).includes(qd)))));
}
function render(){
  const rows=filtered();
  const base=rows; // stats & graphes suivent le filtre
  const byCamp=c=>base.filter(r=>r.camp===c).length;
  const nFinal=base.filter(r=>r.statut==='validee').length;
  const nCrca=base.filter(r=>r.statut==='validee_crca').length;
  const nWait=base.filter(r=>!r.statut||r.statut==='en_attente').length;
  const nDup=base.filter(r=>DUP.has(dupKey(r))).length;
  const isFiltered = base.length !== ALL.length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><b>${base.length}</b><span>inscription${base.length>1?'s':''}${isFiltered?' (filtrées)':(ROLE==='crca'?' (ma région)':'')}</span></div>`+
    `<div class="stat"><b>${nWait}</b><span>en attente</span></div>`+
    `<div class="stat"><b>${nCrca}</b><span>validées CRCA</span></div>`+
    `<div class="stat"><b>${nFinal}</b><span>validées finales</span></div>`+
    (nDup?`<div class="stat dupstat"><b>${nDup}</b><span>⚠ doublons</span></div>`:'')+
    ['CNB Jaune','CNB Vert','CNB Rouge','CBB'].map(c=>`<div class="stat"><b>${byCamp(c)}</b><span>${c}</span></div>`).join('');
  if(!rows.length){document.getElementById('tableWrap').innerHTML='<div class="empty">Aucune inscription.</div>';renderCharts();return;}
  document.getElementById('tableWrap').innerHTML=`<table><thead><tr>
    <th>Date</th><th>Camp</th><th>Nom & prénoms</th><th>N° assurance</th><th>Région</th><th>District</th><th>Groupe</th><th>Taille</th><th>Statut</th><th></th>
    </tr></thead><tbody>${rows.map((r,i)=>{const dk=dupKey(r);const isDup=DUP.has(dk);return `<tr class="${isDup?'duprow':''}">
      <td class="muted">${fmtDate(r.created_at)}</td>
      <td><span class="dot" style="background:${campColor(r.camp)}"></span>${esc(r.camp)}</td>
      <td><a class="namelink" data-i="${ALL.indexOf(r)}" title="Voir l'aperçu de la fiche"><b>${esc(r.prenoms)} ${esc(r.nom)}</b></a>${isDup?' '+dupBadge(dk):''}</td>
      <td class="assur">${esc(r.assurance)||'—'}</td>
      <td>${esc(r.region)}</td><td>${esc(r.district)}</td><td>${esc(r.groupe)}</td>
      <td><b>${esc(r.taille)||'—'}</b></td>
      <td>${statutCell(r)}</td>
      <td><button class="tbtn" data-i="${ALL.indexOf(r)}" title="Télécharger la fiche en PDF">⬇️ PDF</button></td>
    </tr>`;}).join('')}</tbody></table>`;
  document.querySelectorAll('.tbtn[data-i]').forEach(b=>b.onclick=()=>downloadFichePDF(rowToReg(ALL[+b.dataset.i])));
  document.querySelectorAll('.namelink[data-i]').forEach(b=>b.onclick=()=>openPreview(ALL[+b.dataset.i]));
  document.querySelectorAll('.vcBtn[data-ref]').forEach(b=>b.onclick=()=>validate(b.dataset.ref,'valider_crca'));
  document.querySelectorAll('.vfBtn[data-ref]').forEach(b=>b.onclick=()=>validate(b.dataset.ref,'valider_final'));
  document.querySelectorAll('.rBtn[data-ref]').forEach(b=>b.onclick=()=>{
    const m=prompt('Motif du rejet :','Dossier non conforme');
    if(m===null)return; validate(b.dataset.ref,'rejeter',m);
  });
  renderCharts();
}
function countBy(key,data){const m={};(data||ALL).forEach(r=>{const k=(r[key]||'—');m[k]=(m[k]||0)+1;});return m;}
function donutSVG(segs){
  const total=segs.reduce((s,x)=>s+x.value,0);
  const r=54,C=2*Math.PI*r;let off=0;
  const arcs=total===0?'':segs.filter(s=>s.value>0).map(s=>{
    const len=C*s.value/total;
    const c=`<circle cx="70" cy="70" r="${r}" fill="none" stroke="${s.color}" stroke-width="20" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 70 70)"/>`;
    off+=len;return c;
  }).join('');
  const ring=`<circle cx="70" cy="70" r="${r}" fill="none" stroke="#f0ecf6" stroke-width="20"/>`;
  return `<svg viewBox="0 0 140 140" width="132" height="132">${ring}${arcs}<text x="70" y="66" text-anchor="middle" font-size="24" font-weight="700" fill="#4A2370">${total}</text><text x="70" y="84" text-anchor="middle" font-size="10" fill="#6A6478">inscrits</text></svg>`;
}
function barList(items){
  const max=Math.max(1,...items.map(i=>i.value));
  return items.map(i=>`<div class="barrow"><span class="blabel" title="${esc(i.label)}">${esc(i.label)}</span><span class="btrack"><span class="bfill" style="width:${(i.value/max*100).toFixed(1)}%;background:${i.color||'var(--violet)'}"></span></span><span class="bval">${i.value}</span></div>`).join('');
}
function renderCharts(){
  const el=document.getElementById('charts');
  const data=filtered();
  if(!data.length){el.innerHTML='';return;}
  // par camp (anneau)
  const camps=['CNB Jaune','CNB Vert','CNB Rouge','CBB'];
  const campSeg=camps.map(c=>({label:c,value:data.filter(r=>r.camp===c).length,color:campColor(c)}));
  const legend=campSeg.map(s=>`<div class="li"><span class="lab"><span class="dot" style="background:${s.color}"></span>${s.label}</span><span class="num">${s.value}</span></div>`).join('');
  // par taille (barres) — utile pour les tenues
  const order=['S','M','L','XL','XXL','XXXL'];
  const tc=countBy('taille',data);
  const tailleItems=order.map(t=>({label:t,value:tc[t]||0,color:'var(--gold)'}));
  // par région (barres)
  const rc=countBy('region',data);
  const regItems=Object.entries(rc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({label:k,value:v,color:'var(--violet)'}));
  // par district (top 8)
  const dc=countBy('district',data);
  const distItems=Object.entries(dc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,v])=>({label:k,value:v,color:'var(--green)'}));

  el.innerHTML=
    `<div class="chart-card"><h3>Répartition par camp</h3><div class="donutwrap">${donutSVG(campSeg)}<div class="legend">${legend}</div></div></div>`+
    `<div class="chart-card"><h3>Tailles de tenue</h3>${barList(tailleItems)}</div>`+
    `<div class="chart-card"><h3>Par région</h3>${barList(regItems)}</div>`+
    `<div class="chart-card"><h3>Top districts</h3>${barList(distItems)}</div>`;
}

function exportCsv(){
  const rows=filtered();
  if(!rows.length){alert('Aucune inscription à exporter');return;}
  const cols=[['created_at','Horodatage'],['ref','Référence'],['statut','Statut'],['camp','Camp'],['nom','Nom'],['prenoms','Prénoms'],
    ['naissance','Date naissance'],['lieu_naissance','Lieu naissance'],['niveau','Niveau'],['religion','Religion'],
    ['adresse','Adresse'],['email','E-mail'],['mobile','Mobile'],['fixe','Tél fixe'],['profession','Profession'],
    ['societe','Société/École'],['cni','CNI/Passeport'],['cni_date','Date établissement'],['taille','Taille tenue'],['assurance',"N° d'assurance"],['medical','Médical'],
    ['urgence','Contact urgence'],['region','Région'],['district','District'],['groupe','Groupe'],
    ['fonction','Fonction'],['entree',"Année d'entrée"],['promesse','Année de promesse'],['motif','Motif (si rejet)']];
  const q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const head=cols.map(c=>q(c[1])).concat([q('Stages structurés'),q('Stages libres')]).join(';');
  const body=rows.map(r=>{
    const base=cols.map(c=>q(c[0]==='created_at'?fmtDate(r.created_at):r[c[0]]));
    const st=(r.struct||[]).filter(s=>s.date||s.org).map(s=>`${s.intitule}: ${s.date} / ${s.org}`).join(' | ');
    const au=(r.autre||[]).map(s=>`${s.date} / ${s.org}`).join(' | ');
    return base.concat([q(st),q(au)]).join(';');
  });
  const csv='\uFEFF'+[head,...body].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`inscriptions-cnb-cbb-2026-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function logout(){
  ['admin_key','admin_user','admin_role','admin_region'].forEach(k=>sessionStorage.removeItem(k));
  KEY=USER=ROLE=REGION='';
  document.getElementById('logoutTop').style.display='none';
  document.getElementById('dashView').style.display='none';
  document.getElementById('loginView').style.display='block';}

document.getElementById('loginBtn').onclick=async()=>{
  const user=document.getElementById('acct').value;
  const pass=document.getElementById('pwd').value;
  document.getElementById('loginErr').style.display='none';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})});
    const d=await res.json();
    if(!res.ok||!d.ok){document.getElementById('loginErr').style.display='block';return;}
    USER=d.user;KEY=pass;ROLE=d.role;REGION=d.region||'';
    sessionStorage.setItem('admin_key',KEY);sessionStorage.setItem('admin_user',USER);
    sessionStorage.setItem('admin_role',ROLE);sessionStorage.setItem('admin_region',REGION);
    load();
  }catch(e){document.getElementById('loginErr').style.display='block';}
};
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});
['fCamp','fRegion','fDistrict','fStatut'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('fDup').addEventListener('change',render);
document.getElementById('fSearch').addEventListener('input',render);
document.getElementById('refreshBtn').onclick=load;
document.getElementById('clearBtn').onclick=async()=>{
  if(!confirm('⚠️ Vider la base : TOUTES les inscriptions seront définitivement supprimées.\n\nÀ n\u2019utiliser que pendant les tests. Continuer ?')) return;
  if(!confirm('Dernière confirmation — cette action est irréversible. Vider maintenant ?')) return;
  try{
    const res=await fetch('/api/clear',{method:'POST',headers:authHeaders()});
    if(res.status===401){alert('Non autorisé.');return;}
    const data=await res.json();
    alert('Base vidée'+(typeof data.deleted==='number'?` (${data.deleted} inscription(s) supprimée(s)).`:'.'));
    load();
  }catch(e){alert('Erreur : '+e);}
};
document.getElementById('csvBtn').onclick=exportCsv;
document.getElementById('printAllBtn').onclick=()=>{const rows=filtered();if(!rows.length){alert('Rien à imprimer');return;}printFiches(rows.map(rowToReg));};
document.getElementById('logoutTop').onclick=logout;
document.getElementById('pvClose').onclick=closePreview;
document.getElementById('pvDownload').onclick=()=>{ if(currentPreview) downloadFichePDF(currentPreview); };
document.getElementById('previewModal').addEventListener('click',e=>{ if(e.target.id==='previewModal') closePreview(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePreview(); });

if(KEY) load();
</script>
